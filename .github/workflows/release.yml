name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # release-please watches Conventional Commits on main and maintains a "release
  # PR" that bumps the version + updates CHANGELOG.md. Merging that PR creates
  # the git tag and the GitHub Release, and flips `release_created` to true.
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write # release commits, tags, GitHub Releases
      pull-requests: write # open/maintain the release PR
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp

  # Only runs when a release was just cut. Publishes to npm behind the
  # manual-approval `release` environment, which also isolates NPM_TOKEN.
  publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - name: Publish
        run: pnpm publish --no-git-checks --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
